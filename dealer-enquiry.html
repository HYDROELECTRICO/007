<body>
<header id="siteHeader"></header>
<main class="dealer-card" id="mainContent">
<h1>Dealer &amp; Bulk RFQ Enquiry</h1>
<p>Send us your bulk requirement, project list or dealership enquiry. We will respond with availability and quote details.</p>
<label>Name</label><input aria-label="Your name" id="dName" placeholder="Your name"/>
<label>Company / Shop Name</label><input aria-label="Company or shop name" id="dCompany" placeholder="Company or shop name"/>
<label>Phone</label><input aria-label="Phone number" id="dPhone" placeholder="Phone number"/>
<label>City</label><input aria-label="City" id="dCity" placeholder="City"/>
<label>Requirement</label><textarea aria-label="Requirement" id="dReq" placeholder="Brands, categories, quantities, project details" rows="6"></textarea>
<button class="btn-dark" onclick="sendDealer()">Send Dealer Enquiry on WhatsApp</button>
</main>
<footer class="site-footer" id="siteFooter"></footer>
<script src="common.js"></script>
<script>
function sendDealer(){
 const msg='Dealer/Bulk RFQ Enquiry\nName: '+dName.value+'\nCompany: '+dCompany.value+'\nPhone: '+dPhone.value+'\nCity: '+dCity.value+'\nRequirement: '+dReq.value;
 openWhatsApp(msg);
}
</script>
